name: golden-std-spatial
channels:
  - conda-forge
  - bioconda
  - pytorch
  - defaults
dependencies:
  - python=3.10
  # ── Core ──
  - numpy>=1.23
  - pandas>=1.5
  - scipy>=1.9
  - scikit-learn>=1.2
  - matplotlib>=3.6
  - seaborn>=0.12
  # ── Single-cell / Spatial ──
  - scanpy>=1.9
  - anndata>=0.9
  - squidpy>=1.3
  - cellpose>=2.2
  - tifffile
  - Pillow
  # ── Deep learning ──
  - pytorch>=2.0
  - pip:
    - torch-geometric>=2.3
    - torch-scatter
    - torch-sparse
    # ── Bioinformatics ──
    - sra-tools
    - fastp
    # ── Reporting ──
    - jinja2
    - h5py
